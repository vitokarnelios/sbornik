name: Update VPN Subs

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */4 * * *'

# ИСПРАВЛЕНО: Даем экшену права на запись в репозиторий (без этого git push упадет)
permissions:
  contents: write

jobs:
  check-job:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true # Гарантирует использование токена с правами записи

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ИСПРАВЛЕНО: requests[socks] ставит и requests, и правильные зависимости для SOCKS5h
      - name: Install dependencies
        run: |
          pip install "requests[socks]"

      # ИСПРАВЛЕНО: Стабильная установка sing-box через apt-репозиторий
      - name: Install sing-box
        run: |
          sudo mkdir -p /etc/apt/keyrings
          sudo curl -fsSL https://sing-box.app/gpg.key -o /etc/apt/keyrings/sing-box.asc
          echo "deb [signed-by=/etc/apt/keyrings/sing-box.asc] https://deb.sing-box.app/ main" | sudo tee /etc/apt/sources.list.d/sing-box.list
          sudo apt-get update
          sudo apt-get install sing-box -y

      - name: Check sing-box
        run: |
          which sing-box
          sing-box version

      - name: Run main script
        run: python3 main.py

      # ИСПРАВЛЕНО: Локальная конфигурация, точечный git add и безопасный git push без привязки к HEAD
      - name: Commit and push changes
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          
          # Безопаснее добавлять только то, что реально изменилось
          [ -f node_stats.json ] && git add node_stats.json
          [ -f source_fails.json ] && git add source_fails.json
          [ -f subs/vless_001.txt ] && git add subs/vless_001.txt
          
          if git diff --staged --quiet; then
            echo "Никаких изменений не обнаружено."
          else
            # [skip ci] защитит от случайных петель, если ты добавишь триггер on: push
            git commit -m "Auto update: validated subs & analytics [skip ci]"
            git push || true
          fi
